<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markov Audio Grapher</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!--<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>-->
    <!--<script src="https://cdn.jsdelivr.net/npm/@tailwindplus/elements@1" type="module"></script>-->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#1e1e1e',
                        darker: '#121212',
                        darkest: '#0a0a0a',
                        primary: '#3b82f6',
                        secondary: '#4b5563',
                        accent: '#8b5cf6',
                        danger: '#ef4444'
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; }
        #canvas-container {
            position: relative;
            overflow: hidden;
            background-color: #121212;
            cursor: grab;
        }
        #canvas-container:active { cursor: grabbing; }
        canvas { display: block; }
        .node-input-label { cursor: pointer; }
        
        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e1e1e; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #6b7280; }

        .playing-glow {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.8);
            border-color: #3b82f6 !important;
        }
    </style>
</head>
<body class="bg-darker text-gray-200 h-screen flex flex-col overflow-hidden select-none">

    <!-- ヘッダー -->
    <header class="bg-darkest p-4 border-b border-gray-800 flex justify-between items-center z-10">
        <h1 class="text-xl font-bold flex items-center gap-2">
            <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            Markov Audio Grapher
        </h1>
        <div class="flex gap-2 items-center">
            <span id="status-display" class="text-sm bg-gray-800 px-3 py-1 rounded-full text-gray-400 mr-4">
                準備完了: ノードをドラッグして配置、またはクリックして接続
            </span>
            <button id="btn-save" class="bg-secondary hover:bg-gray-500 px-4 py-2 rounded text-sm transition">セーブ</button>
            <button id="btn-load" class="bg-secondary hover:bg-gray-500 px-4 py-2 rounded text-sm transition relative">
                ロード
                <input type="file" id="file-load" accept=".json" class="absolute inset-0 opacity-0 cursor-pointer">
            </button>
            <div class="w-px h-6 bg-gray-700 mx-2"></div>
            <button id="btn-play-all" class="bg-primary hover:bg-blue-600 px-6 py-2 rounded font-bold transition flex items-center gap-1">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>
                再生
            </button>
            <button id="btn-stop-all" class="bg-danger hover:bg-red-600 px-6 py-2 rounded font-bold transition flex items-center gap-1 hidden">
                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                停止
            </button>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- 左サイドバー：音声一覧 -->
        <aside class="w-72 bg-dark border-r border-gray-800 flex flex-col z-10">
            <div class="p-4 border-b border-gray-800">
                <h2 class="text-lg font-semibold mb-3">音声一覧</h2>
                <div class="flex gap-2">
                    <label class="flex-1 bg-gray-700 hover:bg-gray-600 text-center py-2 rounded cursor-pointer transition text-sm">
                        MP3追加
                        <input type="file" id="file-audio" accept="audio/mp3, audio/wav, audio/ogg" multiple class="hidden">
                    </label>
                </div>
            </div>
            
            <div class="flex-1 overflow-y-auto p-2" id="audio-list">
                <!-- スタートノード要素 (ドラッグ可能) -->
                <div class="audio-item bg-gray-800 border border-accent p-3 rounded mb-2 cursor-grab flex items-center justify-between" draggable="true" data-type="start">
                    <div class="flex items-center gap-2 pointer-events-none">
                        <div class="w-3 h-3 rounded-full bg-accent"></div>
                        <span class="font-bold text-accent">START NODE</span>
                    </div>
                </div>
                <!-- 音声リストはここに動的に追加される -->
            </div>
        </aside>

        <!-- メイン：キャンバス領域 -->
        <main class="flex-1 relative flex flex-col">
            <div id="canvas-container" class="flex-1 w-full h-full relative">
                <canvas id="markov-canvas"></canvas>
                <!-- HTMLベースのオーバーレイUI（確率入力やノード削除ボタンなど） -->
                <div id="ui-overlay" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            </div>
            
            <!-- 下部プログレスバー（読み込み/デコード時） -->
            <div id="loading-bar-container" class="absolute bottom-0 left-0 right-0 h-1 bg-gray-800 hidden">
                <div id="loading-bar" class="h-full bg-primary w-0 transition-all duration-300"></div>
            </div>
        </main>
    </div>

    <script>
        /**
         * システム定数・状態
         */
        const AppState = {
            audioContext: null,
            audioBuffers: {}, // { name: AudioBuffer }
            audioFiles: [],   // { id, name, file, isMissing }
            nodes: [],
            edges: [],
            
            camera: { x: 0, y: 0, zoom: 1 },
            
            interaction: {
                isDraggingBg: false,
                isDraggingNode: false, // 追加: ドラッグ中かどうかの判定フラグ
                dragStartX: 0,         // 追加: ドラッグ開始X座標
                dragStartY: 0,         // 追加: ドラッグ開始Y座標
                lastMousePos: { x: 0, y: 0 },
                draggedNode: null,
                selectedNodeForConnection: null,
                hoveredNode: null,
                hoveredEdge: null,
                mode: 'normal', // 'normal', 'connecting'
            },
            
            playback: {
                isPlaying: false,
                currentNode: null,
                sourceNode: null, // 現在再生中のAudioBufferSourceNode
                timeoutId: null
            },

            theme: {
                bg: '#121212',
                grid: '#1e1e1e',
                nodeBg: '#1f29376f',
                nodeBorder: '#374151',
                nodeText: '#e5e7eb',
                startNodeBg: '#4c1d95',
                startNodeBorder: '#8b5cf6',
                edge: '#6b7280',
                edgeHover: '#9ca3af',
                edgeActive: '#3b82f6',
                text: '#9ca3af',
                danger: '#ef4444'
            }
        };

        // DOM要素
        const canvas = document.getElementById('markov-canvas');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('canvas-container');
        const overlay = document.getElementById('ui-overlay');
        const audioListEl = document.getElementById('audio-list');
        const statusDisplay = document.getElementById('status-display');

        // ノードのサイズ設定
        const NODE_WIDTH = 140;
        const NODE_HEIGHT = 50;
        const NODE_RADIUS = 8;

        /**
         * 初期化処理
         */
        function init() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            setupEventListeners();
            setupCanvasInteraction();
            
            requestAnimationFrame(draw);
        }

        function resizeCanvas() {
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            draw();
            updateUIOverlay();
        }

        /**
         * Web Audio API 初期化
         */
        function getAudioContext() {
            if (!AppState.audioContext) {
                AppState.audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (AppState.audioContext.state === 'suspended') {
                AppState.audioContext.resume();
            }
            return AppState.audioContext;
        }

        /**
         * 音声ファイルの処理
         */
        document.getElementById('file-audio').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;

            for (let file of files) {
                const name = file.name.replace(/\.[^/.]+$/, ""); // 拡張子削除
                
                // 既存チェック
                const existingIndex = AppState.audioFiles.findIndex(a => a.name === name);
                
                if (existingIndex >= 0) {
                    // Missing状態だったものを復旧
                    AppState.audioFiles[existingIndex].file = file;
                    AppState.audioFiles[existingIndex].isMissing = false;
                    delete AppState.audioBuffers[name]; // キャッシュクリア
                } else {
                    AppState.audioFiles.push({
                        id: Date.now().toString() + Math.random().toString(36).substr(2, 5),
                        name: name,
                        file: file,
                        isMissing: false
                    });
                }
            }
            
            renderAudioList();
            draw(); // Missing表示の更新のため
            e.target.value = ''; // Reset
        });

        // 音声ファイルリストの描画
        function renderAudioList() {
            // StartNode以外の要素をクリア
            const items = Array.from(audioListEl.children);
            items.forEach(item => {
                if (item.dataset.type !== 'start') {
                    item.remove();
                }
            });

            AppState.audioFiles.forEach(audio => {
                const el = document.createElement('div');
                el.className = `audio-item border p-3 rounded mb-2 flex items-center justify-between group ${audio.isMissing ? 'bg-red-900/30 border-red-700' : 'bg-gray-800 border-gray-700 hover:border-gray-500'} cursor-grab`;
                el.draggable = true;
                el.dataset.id = audio.id;
                el.dataset.name = audio.name;
                el.dataset.type = 'audio';

                // ドラッグ開始
                el.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData('text/plain', JSON.stringify({
                        type: 'audio',
                        name: audio.name,
                        isMissing: audio.isMissing
                    }));
                    e.dataTransfer.effectAllowed = 'copy';
                });

                const nameContainer = document.createElement('div');
                nameContainer.className = 'flex-1 overflow-hidden pointer-events-none';
                
                const nameSpan = document.createElement('span');
                nameSpan.className = `truncate block text-sm font-medium ${audio.isMissing ? 'text-red-400' : 'text-gray-200'}`;
                nameSpan.textContent = audio.name;
                if (audio.isMissing) {
                    nameSpan.textContent += ' (未発見)';
                }
                
                nameContainer.appendChild(nameSpan);

                // 再生ボタン
                const playBtn = document.createElement('button');
                playBtn.className = `w-8 h-8 rounded-full flex items-center justify-center transition-colors ${audio.isMissing ? 'text-gray-600 cursor-not-allowed' : 'text-gray-400 hover:text-white hover:bg-gray-700'} pointer-events-auto`;
                playBtn.innerHTML = '<svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z" clip-rule="evenodd"></path></svg>';
                
                if (!audio.isMissing) {
                    playBtn.onclick = (e) => {
                        e.stopPropagation();
                        playAudioPreview(audio);
                    };
                }

                el.appendChild(nameContainer);
                el.appendChild(playBtn);
                audioListEl.appendChild(el);
            });
        }

        // Start node のドラッグ設定
        const startNodeEl = document.querySelector('[data-type="start"]');
        startNodeEl.addEventListener('dragstart', (e) => {
            e.dataTransfer.setData('text/plain', JSON.stringify({ type: 'start' }));
            e.dataTransfer.effectAllowed = 'copy';
        });

        // プレビュー再生
        async function playAudioPreview(audioFile) {
            if (audioFile.isMissing) return;
            
            const actx = getAudioContext();
            let buffer = AppState.audioBuffers[audioFile.name];
            
            if (!buffer) {
                try {
                    setStatus('デコード中...');
                    const arrayBuffer = await audioFile.file.arrayBuffer();
                    buffer = await actx.decodeAudioData(arrayBuffer);
                    
                    // 無音カット(簡易版: 最初と最後のしきい値以下のサンプルをトリミング)
                    buffer = trimSilence(buffer);
                    AppState.audioBuffers[audioFile.name] = buffer;
                    setStatus('準備完了');
                } catch (err) {
                    console.error("Audio decode error:", err);
                    setStatus('デコード失敗', true);
                    return;
                }
            }
            
            const source = actx.createBufferSource();
            source.buffer = buffer;
            source.connect(actx.destination);
            source.start();
        }

        /**
         * 無音部分のカット (簡易的なTrim処理)
         */
        function trimSilence(buffer) {
            const threshold = 0.01; // しきい値
            const channels = buffer.numberOfChannels;
            const length = buffer.length;
            const sampleRate = buffer.sampleRate;
            
            let startOffset = 0;
            let endOffset = length;

            // 最初から探索
            let foundStart = false;
            for (let i = 0; i < length && !foundStart; i++) {
                for (let c = 0; c < channels; c++) {
                    const data = buffer.getChannelData(c);
                    if (Math.abs(data[i]) > threshold) {
                        startOffset = Math.max(0, i - Math.floor(sampleRate * 0.01)); // 少し余裕を持たせる (10ms)
                        foundStart = true;
                        break;
                    }
                }
            }

            // 最後から探索
            let foundEnd = false;
            for (let i = length - 1; i >= 0 && !foundEnd; i--) {
                for (let c = 0; c < channels; c++) {
                    const data = buffer.getChannelData(c);
                    if (Math.abs(data[i]) > threshold) {
                        endOffset = Math.min(length, i + Math.floor(sampleRate * 0.01));
                        foundEnd = true;
                        break;
                    }
                }
            }

            // 無音が少なければそのまま返す
            if (startOffset === 0 && endOffset === length) return buffer;
            if (endOffset <= startOffset) return buffer; // 異常値

            const newLength = endOffset - startOffset;
            const actx = getAudioContext();
            const newBuffer = actx.createBuffer(channels, newLength, sampleRate);

            for (let c = 0; c < channels; c++) {
                const newData = newBuffer.getChannelData(c);
                const oldData = buffer.getChannelData(c);
                for (let i = 0; i < newLength; i++) {
                    newData[i] = oldData[i + startOffset];
                }
            }

            return newBuffer;
        }


        /**
         * キャンバスへのドラッグ＆ドロップ
         */
        container.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'copy';
        });

        container.addEventListener('drop', (e) => {
            e.preventDefault();
            
            try {
                const dataStr = e.dataTransfer.getData('text/plain');
                if (!dataStr) return;
                
                const data = JSON.parse(dataStr);
                
                // マウス位置をキャンバス座標系に変換
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const worldPos = screenToWorld(mouseX, mouseY);
                
                // ノードの追加
                const newNodeId = 'node_' + Date.now();
                
                if (data.type === 'start') {
                    // Startノードは1つだけにする
                    const existingStart = AppState.nodes.find(n => n.type === 'start');
                    if (existingStart) {
                        existingStart.x = worldPos.x;
                        existingStart.y = worldPos.y;
                    } else {
                        AppState.nodes.push({
                            id: 'start_node',
                            type: 'start',
                            name: 'START',
                            x: worldPos.x,
                            y: worldPos.y
                        });
                    }
                } else if (data.type === 'audio') {
                    AppState.nodes.push({
                        id: newNodeId,
                        type: 'audio',
                        name: data.name,
                        x: worldPos.x,
                        y: worldPos.y
                    });
                }
                
                draw();
                updateUIOverlay();
                
            } catch (err) {
                console.error("Drop error", err);
            }
        });

        /**
         * 座標変換
         */
        function screenToWorld(x, y) {
            return {
                x: (x - AppState.camera.x) / AppState.camera.zoom,
                y: (y - AppState.camera.y) / AppState.camera.zoom
            };
        }

        function worldToScreen(x, y) {
            return {
                x: x * AppState.camera.zoom + AppState.camera.x,
                y: y * AppState.camera.zoom + AppState.camera.y
            };
        }

        /**
         * インタラクション (マウス/カメラ)
         */
        function setupCanvasInteraction() {
            container.addEventListener('wheel', (e) => {
                e.preventDefault();
                
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                // ズーム前のワールド座標
                const worldPosBefore = screenToWorld(mouseX, mouseY);
                
                // ズーム倍率変更
                const zoomIntensity = 0.1;
                const delta = e.deltaY > 0 ? -1 : 1;
                let newZoom = AppState.camera.zoom * (1 + delta * zoomIntensity);
                
                // 制限
                newZoom = Math.max(0.2, Math.min(newZoom, 5));
                AppState.camera.zoom = newZoom;
                
                // ズーム後の同じスクリーン座標に対応するワールド座標がずれないようにカメラを調整
                AppState.camera.x = mouseX - worldPosBefore.x * AppState.camera.zoom;
                AppState.camera.y = mouseY - worldPosBefore.y * AppState.camera.zoom;
                
                draw();
                updateUIOverlay();
            }, { passive: false });

            container.addEventListener('mousedown', (e) => {
                if (e.target.closest('#ui-overlay > div')) return; // UIクリック時は無視
                if (e.button !== 0 && e.button !== 1) return; // 左クリックと中クリックのみ

                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const worldPos = screenToWorld(mouseX, mouseY);

                AppState.interaction.lastMousePos = { x: e.clientX, y: e.clientY };
                // ドラッグ判定用の初期化
                AppState.interaction.dragStartX = e.clientX;
                AppState.interaction.dragStartY = e.clientY;
                AppState.interaction.isDraggingNode = false;

                // ノードのヒットテスト
                const clickedNode = getNodeAt(worldPos.x, worldPos.y);

                if (clickedNode) {
                    if (AppState.interaction.mode === 'connecting') {
                        // 接続モード時
                        if (AppState.interaction.selectedNodeForConnection) {
                            createEdge(AppState.interaction.selectedNodeForConnection, clickedNode);
                            exitConnectingMode();
                        }
                    } else {
                        // 通常モード: クリックしたノードを選択し、ドラッグ準備
                        AppState.interaction.draggedNode = clickedNode;
                    }
                } else {
                    // 背景クリック
                    if (AppState.interaction.mode === 'connecting') {
                        exitConnectingMode();
                    } else {
                        AppState.interaction.isDraggingBg = true;
                    }
                }
                draw();
            });

            window.addEventListener('mousemove', (e) => {
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                const worldPos = screenToWorld(mouseX, mouseY);
                
                const dx = e.clientX - AppState.interaction.lastMousePos.x;
                const dy = e.clientY - AppState.interaction.lastMousePos.y;

                if (AppState.interaction.isDraggingBg) {
                    AppState.camera.x += dx;
                    AppState.camera.y += dy;
                    draw();
                    updateUIOverlay();
                } else if (AppState.interaction.draggedNode) {
                    // 移動距離から「本当にドラッグしたか」を判定
                    const totalDx = Math.abs(e.clientX - AppState.interaction.dragStartX);
                    const totalDy = Math.abs(e.clientY - AppState.interaction.dragStartY);
                    if (totalDx > 3 || totalDy > 3) {
                        AppState.interaction.isDraggingNode = true;
                    }

                    AppState.interaction.draggedNode.x += dx / AppState.camera.zoom;
                    AppState.interaction.draggedNode.y += dy / AppState.camera.zoom;
                    draw();
                    updateUIOverlay();
                }

                AppState.interaction.lastMousePos = { x: e.clientX, y: e.clientY };

                /*// ホバー判定 (マウスがキャンバス内にある場合のみ)
                if (e.target === canvas || e.target.parentElement === container) {
                     AppState.interaction.hoveredNode = getNodeAt(worldPos.x, worldPos.y);
                     canvas.style.cursor = AppState.interaction.hoveredNode ? 'pointer' : (AppState.interaction.isDraggingBg ? 'grabbing' : 'grab');
                     draw();
                }*/
                // ホバー判定 (マウスがキャンバス内にある場合のみ)
                if (e.target === canvas || e.target.parentElement === container) {
                     AppState.interaction.hoveredNode = getNodeAt(worldPos.x, worldPos.y);
                     canvas.style.cursor = AppState.interaction.hoveredNode ? 'pointer' : (AppState.interaction.isDraggingBg ? 'grabbing' : 'grab');
                     if (!AppState.interaction.isDraggingBg && !AppState.interaction.draggedNode) {
                         draw(); // ホバー状態の更新
                     }
                }
            });

            window.addEventListener('mouseup', (e) => {
                /*if (AppState.interaction.draggedNode) {
                    // ドラッグ終了（移動距離が小さい場合はクリックと判定して接続モードへ）
                    AppState.interaction.draggedNode = null;
                }
                AppState.interaction.isDraggingBg = false;
                canvas.style.cursor = AppState.interaction.hoveredNode ? 'pointer' : 'grab';*/
                if (AppState.interaction.draggedNode) {
                    // ドラッグしておらず、かつ接続モードでなければクリックと判定
                    if (!AppState.interaction.isDraggingNode && AppState.interaction.mode !== 'connecting') {
                        enterConnectingMode(AppState.interaction.draggedNode);
                    }
                    //AS
                    /*const totalDx = Math.abs(e.clientX - AppState.interaction.dragStartX);
                    const totalDy = Math.abs(e.clientY - AppState.interaction.dragStartY);
                    if((totalDx < 3 || totalDy < 3) && !AppState.interaction.isDraggingNode && AppState.interaction.mode !== 'connecting')
                    {
                        enterConnectingMode(AppState.interaction.draggedNode);
                    }*/
                    AppState.interaction.draggedNode = null;
                    AppState.interaction.isDraggingNode = false;
                }
                AppState.interaction.isDraggingBg = false;
                canvas.style.cursor = AppState.interaction.hoveredNode ? 'pointer' : 'grab';
                
                // ドラッグ終了時にUIを再表示して更新
                overlay.style.display = '';
                //updateUIOverlay();
            });
            
            // クリック判定 (ドラッグではない純粋なクリック)
            container.addEventListener('click', (e) => {
                // UIオーバーレイクリックは無視
                if (e.target !== canvas && e.target !== container) return;

                const rect = canvas.getBoundingClientRect();
                const worldPos = screenToWorld(e.clientX - rect.left, e.clientY - rect.top);
                const clickedNode = getNodeAt(worldPos.x, worldPos.y);
                
                const totalDx = Math.abs(e.clientX - AppState.interaction.dragStartX);
                const totalDy = Math.abs(e.clientY - AppState.interaction.dragStartY);
                if ((totalDx < 0.01 || totalDy < 0.01) && clickedNode && AppState.interaction.mode !== 'connecting' && !AppState.interaction.draggedNode) {
                     enterConnectingMode(clickedNode);
                }
            });
        }

        function getNodeAt(x, y) {
            // 逆順（手前にあるものから）判定
            for (let i = AppState.nodes.length - 1; i >= 0; i--) {
                const node = AppState.nodes[i];
                const halfW = NODE_WIDTH / 2;
                const halfH = NODE_HEIGHT / 2;
                if (x >= node.x - halfW && x <= node.x + halfW &&
                    y >= node.y - halfH && y <= node.y + halfH) {
                    return node;
                }
            }
            return null;
        }

        /**
         * エッジ操作
         */
        function enterConnectingMode(node) {
            AppState.interaction.mode = 'connecting';
            AppState.interaction.selectedNodeForConnection = node;
            setStatus(`接続モード: ${node.name} から繋ぐ先のノードをクリック (背景クリックでキャンセル)`);
            draw();
        }

        function exitConnectingMode() {
            AppState.interaction.mode = 'normal';
            AppState.interaction.selectedNodeForConnection = null;
            setStatus('準備完了: ノードをドラッグして配置、またはクリックして接続');
            draw();
        }

        function createEdge(fromNode, toNode) {
            // 既存のエッジをチェック
            const existingEdge = AppState.edges.find(e => e.from === fromNode.id && e.to === toNode.id);
            if (existingEdge) return; // 既に存在

            // 新規エッジ作成
            AppState.edges.push({
                id: 'edge_' + Date.now(),
                from: fromNode.id,
                to: toNode.id,
                //prob: 1.0 // 初期確率は1
                weight: 1.0 // prob を weight に変更。初期値は1
            });
            
            // fromノードからの出力エッジの確率を正規化
            //normalizeProbabilities(fromNode.id);
            updateUIOverlay();
        }

        function deleteNode(nodeId) {
            AppState.nodes = AppState.nodes.filter(n => n.id !== nodeId);
            // 関連するエッジも削除
            const affectedSources = new Set();
            AppState.edges = AppState.edges.filter(e => {
                if (e.from === nodeId || e.to === nodeId) {
                    if (e.from !== nodeId) affectedSources.add(e.from);
                    return false;
                }
                return true;
            });
            
            // 削除されたノードへ向かっていたエッジの元のノードの確率を再計算
            //affectedSources.forEach(id => normalizeProbabilities(id));
            
            if (AppState.playback.currentNode && AppState.playback.currentNode.id === nodeId) {
                stopPlayback();
            }
            
            draw();
            updateUIOverlay();
        }

        function deleteEdge(edgeId) {
            const edge = AppState.edges.find(e => e.id === edgeId);
            if (edge) {
                const fromId = edge.from;
                AppState.edges = AppState.edges.filter(e => e.id !== edgeId);
                //normalizeProbabilities(fromId);
                draw();
                updateUIOverlay();
            }
        }

        function updateEdgeWeight(edgeId, newWeightStr) {
            const val = parseFloat(newWeightStr);
            if (isNaN(val) || val < 0) return;
            
            const edge = AppState.edges.find(e => e.id === edgeId);
            if (edge) {
                edge.weight = val;
            }

        /**
         * 描画処理
         */
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 背景グリッド描画
            drawGrid();

            ctx.save();
            ctx.translate(AppState.camera.x, AppState.camera.y);
            ctx.scale(AppState.camera.zoom, AppState.camera.zoom);

            // エッジの描画
            drawEdges();

            // 接続中の線
            if (AppState.interaction.mode === 'connecting' && AppState.interaction.selectedNodeForConnection) {
                const rect = canvas.getBoundingClientRect();
                const mouseX = AppState.interaction.lastMousePos.x - rect.left;
                const mouseY = AppState.interaction.lastMousePos.y - rect.top;
                const mouseWorld = screenToWorld(mouseX, mouseY);
                
                const from = AppState.interaction.selectedNodeForConnection;
                
                ctx.beginPath();
                ctx.moveTo(from.x, from.y);
                ctx.lineTo(mouseWorld.x, mouseWorld.y);
                ctx.strokeStyle = AppState.theme.edgeHover;
                ctx.lineWidth = 2;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // ノードの描画
            AppState.nodes.forEach(node => drawNode(node));

            ctx.restore();
        }

        function drawGrid() {
            const gridSize = 40 * AppState.camera.zoom;
            const offsetX = AppState.camera.x % gridSize;
            const offsetY = AppState.camera.y % gridSize;

            ctx.beginPath();
            ctx.strokeStyle = AppState.theme.grid;
            ctx.lineWidth = 1;

            for (let x = offsetX; x < canvas.width; x += gridSize) {
                ctx.moveTo(x, 0);
                ctx.lineTo(x, canvas.height);
            }
            for (let y = offsetY; y < canvas.height; y += gridSize) {
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
            }
            ctx.stroke();
        }

        function drawNode(node) {
            const halfW = NODE_WIDTH / 2;
            const halfH = NODE_HEIGHT / 2;

            ctx.save();
            ctx.translate(node.x, node.y);

            // 再生中のグロー効果
            if (AppState.playback.currentNode && AppState.playback.currentNode.id === node.id) {
                ctx.shadowColor = AppState.theme.edgeActive;
                ctx.shadowBlur = 20;
            }

            // ノード背景
            ctx.beginPath();
            ctx.roundRect(-halfW, -halfH, NODE_WIDTH, NODE_HEIGHT, NODE_RADIUS);
            
            if (node.type === 'start') {
                ctx.fillStyle = AppState.theme.startNodeBg;
                ctx.strokeStyle = AppState.theme.startNodeBorder;
            } else {
                ctx.fillStyle = AppState.theme.nodeBg;
                ctx.strokeStyle = AppState.theme.nodeBorder;
                
                // Missing状態のチェック
                const audioInfo = AppState.audioFiles.find(a => a.name === node.name);
                if (audioInfo && audioInfo.isMissing) {
                    ctx.strokeStyle = AppState.theme.danger;
                    ctx.fillStyle = '#451a1a'; // 暗い赤
                }
            }

            // 選択/ホバー表現
            if (AppState.interaction.hoveredNode === node || AppState.interaction.selectedNodeForConnection === node) {
                 ctx.strokeStyle = AppState.theme.edgeHover;
                 if (AppState.interaction.selectedNodeForConnection === node) {
                     ctx.lineWidth = 3;
                     ctx.strokeStyle = AppState.theme.edgeActive;
                 } else {
                     ctx.lineWidth = 2;
                 }
            } else {
                ctx.lineWidth = 1;
                if (AppState.playback.currentNode && AppState.playback.currentNode.id === node.id) {
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = AppState.theme.edgeActive;
                }
            }

            ctx.fill();
            ctx.shadowBlur = 0; // テキストに影が落ちないようにリセット
            ctx.stroke();

            // ノード名テキスト
            ctx.fillStyle = AppState.theme.nodeText;
            ctx.font = '12px Inter, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 文字列のトリミング
            let displayName = node.name;
            if (ctx.measureText(displayName).width > NODE_WIDTH - 20) {
                while(displayName.length > 0 && ctx.measureText(displayName + '...').width > NODE_WIDTH - 20) {
                    displayName = displayName.slice(0, -1);
                }
                displayName += '...';
            }
            
            ctx.fillText(displayName, 0, 0);

            ctx.restore();
        }

        function drawEdges() {
            // エッジの描画
            AppState.edges.forEach(edge => {
                const n1 = AppState.nodes.find(n => n.id === edge.from);
                const n2 = AppState.nodes.find(n => n.id === edge.to);
                
                if (!n1 || !n2) return;

                const isReverse = AppState.edges.some(e => e.from === n2.id && e.to === n1.id);
                
                if (n1.id === n2.id) {
                    drawSelfLoop(n1, edge);
                } else {
                    drawDirectedEdge(n1, n2, isReverse, edge);
                }
            });
        }

        function drawDirectedEdge(n1, n2, isCurved, edge) {
            const dx = n2.x - n1.x;
            const dy = n2.y - n1.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            
            if (dist === 0) return;

            // ノードの境界と交差する点を計算（簡易的な矩形との交差計算の近似として円を利用）
            const nodeRadiusApprox = Math.min(NODE_WIDTH, NODE_HEIGHT) * 0.7; 
            
            const dirX = dx / dist;
            const dirY = dy / dist;

            let startX, startY, endX, endY, cpX, cpY;

            if (isCurved) {
                // 双方向の場合はカーブさせる
                const curveOffset = 30;
                // 法線ベクトル
                const nx = -dirY;
                const ny = dirX;
                
                cpX = n1.x + dx/2 + nx * curveOffset;
                cpY = n1.y + dy/2 + ny * curveOffset;

                // 始点と終点の調整 (ベジェ曲線に沿うように)
                startX = n1.x + dirX * nodeRadiusApprox + nx * curveOffset * 0.2;
                startY = n1.y + dirY * nodeRadiusApprox + ny * curveOffset * 0.2;
                endX = n2.x - dirX * nodeRadiusApprox + nx * curveOffset * 0.2;
                endY = n2.y - dirY * nodeRadiusApprox + ny * curveOffset * 0.2;

            } else {
                startX = n1.x + dirX * nodeRadiusApprox;
                startY = n1.y + dirY * nodeRadiusApprox;
                endX = n2.x - dirX * nodeRadiusApprox;
                endY = n2.y - dirY * nodeRadiusApprox;
            }

            // 線を描画
            ctx.beginPath();
            ctx.moveTo(startX, startY);
            if (isCurved) {
                ctx.quadraticCurveTo(cpX, cpY, endX, endY);
            } else {
                ctx.lineTo(endX, endY);
            }

            // グラデーションで向きを表現
            const gradient = ctx.createLinearGradient(startX, startY, endX, endY);
            gradient.addColorStop(0, '#4b5563'); // secondary
            gradient.addColorStop(1, '#9ca3af'); // text color

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 2;
            
            // 再生中のハイライト
            if (AppState.playback.currentNode && AppState.playback.currentNode.id === n1.id) {
                ctx.strokeStyle = AppState.theme.edgeActive;
                ctx.lineWidth = 3;
            }

            ctx.stroke();

            // 矢印の頭
            let angle;
            if (isCurved) {
                // 終点での接線の角度
                const t = 1.0; // 終点
                const dtx = 2 * (1 - t) * (cpX - startX) + 2 * t * (endX - cpX);
                const dty = 2 * (1 - t) * (cpY - startY) + 2 * t * (endY - cpY);
                angle = Math.atan2(dty, dtx);
            } else {
                angle = Math.atan2(dy, dx);
            }

            drawArrowHead(endX, endY, angle, ctx.strokeStyle);
        }

        function drawSelfLoop(node, edge) {
            const x = node.x;
            const y = node.y - NODE_HEIGHT/2;
            const r = 25;

            ctx.beginPath();
            ctx.arc(x, y - r, r, -Math.PI/2 + 0.5, Math.PI*1.5 - 0.5);
            
            ctx.strokeStyle = AppState.theme.edge;
            if (AppState.playback.currentNode && AppState.playback.currentNode.id === node.id) {
                ctx.strokeStyle = AppState.theme.edgeActive;
                ctx.lineWidth = 3;
            } else {
                ctx.lineWidth = 2;
            }
            ctx.stroke();

            // 矢印
            drawArrowHead(x + Math.cos(Math.PI*1.5 - 0.5)*r, y - r + Math.sin(Math.PI*1.5 - 0.5)*r, 0, ctx.strokeStyle);
        }

        function drawArrowHead(x, y, angle, color) {
            const headlen = 10;
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x - headlen * Math.cos(angle - Math.PI / 6), y - headlen * Math.sin(angle - Math.PI / 6));
            ctx.lineTo(x - headlen * Math.cos(angle + Math.PI / 6), y - headlen * Math.sin(angle + Math.PI / 6));
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
        }

                    }
                }

                const screenPos = worldToScreen(midX, midY);

                if (screenPos.x < 0 || screenPos.x > canvas.width || screenPos.y < 0 || screenPos.y > canvas.height) return;

                input.onchange = (e) => updateEdgeWeight(edge.id, e.target.value);

                input.onmousedown = (e) => e.stopPropagation();

                const delBtn = document.createElement('button');

        function setStatus(text, isError = false) {
            statusDisplay.textContent = text;
            if (isError) {
                statusDisplay.classList.add('text-red-400');
                statusDisplay.classList.remove('text-gray-400');
            } else {
                statusDisplay.classList.remove('text-red-400');
                statusDisplay.classList.add('text-gray-400');
            }
        }


        /**
         * 再生ロジック (マルコフ連鎖)
         */
        document.getElementById('btn-play-all').addEventListener('click', startMarkovPlayback);
        document.getElementById('btn-stop-all').addEventListener('click', stopPlayback);

        async function startMarkovPlayback() {
            if (AppState.playback.isPlaying) return;

            const startNode = AppState.nodes.find(n => n.type === 'start');
            if (!startNode) {
                alert("STARTノードが配置されていません");
                return;
            }

            const outEdges = AppState.edges.filter(e => e.from === startNode.id);
            if (outEdges.length === 0) {
                alert("STARTノードから接続されているノードがありません");
                return;
            }

            // 全ての使用されている音源のデコード完了を待機
            setStatus('音源を準備中...');
            showLoadingBar(true);
            const actx = getAudioContext();
            
            const usedAudioNames = new Set();
            AppState.nodes.forEach(n => {
                if (n.type === 'audio') usedAudioNames.add(n.name);
            });

            let loadedCount = 0;
            const totalToLoad = usedAudioNames.size;

            for (const name of usedAudioNames) {
                if (!AppState.audioBuffers[name]) {
                    const audioInfo = AppState.audioFiles.find(a => a.name === name);
                    if (audioInfo && !audioInfo.isMissing) {
                        try {
                            const arrayBuffer = await audioInfo.file.arrayBuffer();
                            let buffer = await actx.decodeAudioData(arrayBuffer);
                            buffer = trimSilence(buffer); // 無音カット
                            AppState.audioBuffers[name] = buffer;
                        } catch(e) {
                            console.error("Decode err:", e);
                            alert(`音源 ${name} のデコードに失敗しました`);
                            showLoadingBar(false);
                            setStatus('再生中止');
                            return;
                        }
                    } else {
                        alert(`音源 ${name} が見つかりません。MP3を追加してください。`);
                        showLoadingBar(false);
                        setStatus('再生中止');
                        return;
                    }
                }
                loadedCount++;
                updateLoadingBar(loadedCount / totalToLoad * 100);
            }

            showLoadingBar(false);
            setStatus('再生中...', false);
            document.getElementById('btn-play-all').classList.add('hidden');
            document.getElementById('btn-stop-all').classList.remove('hidden');
            
            AppState.playback.isPlaying = true;

            // Startノードの次のノードを選択して再生開始
            const nextNodeId = chooseNextNode(startNode.id);
            if (nextNodeId) {
                const nextNode = AppState.nodes.find(n => n.id === nextNodeId);
                playNode(nextNode);
            } else {
                stopPlayback();
            }
        }

        function playNode(node) {
            if (!AppState.playback.isPlaying || !node) {
                stopPlayback();
                return;
            }

            AppState.playback.currentNode = node;
            draw(); // Highlight current node

            if (node.type === 'start') {
                // 万が一startに戻ってきた場合
                const nextNodeId = chooseNextNode(node.id);
                if (nextNodeId) {
                    // Startは音がないので即時次へ
                    setTimeout(() => playNode(AppState.nodes.find(n => n.id === nextNodeId)), 10);
                } else {
                    stopPlayback();
                }
                return;
            }

            const actx = getAudioContext();
            const buffer = AppState.audioBuffers[node.name];
            
            if (!buffer) {
                console.warn(`Buffer not found for ${node.name}`);
                stopPlayback();
                return;
            }

            const source = actx.createBufferSource();
            source.buffer = buffer;
            source.connect(actx.destination);
            
            AppState.playback.sourceNode = source;

            // 再生終了時の処理
            source.onended = () => {
                if (!AppState.playback.isPlaying) return; // 停止ボタンが押された場合は無視
                
                const nextNodeId = chooseNextNode(node.id);
                if (nextNodeId) {
                    const nextNode = AppState.nodes.find(n => n.id === nextNodeId);
                    // Web Audio APIの遅延を最小限にするため、即座に次の再生をスケジュール
                    playNode(nextNode);
                } else {
                    stopPlayback(); // 終端に到達
                }
            };

            source.start();
        }

            // 浮動小数点誤差の対策でフォールバック

       function chooseNextNode(fromNodeId) {
            const outEdges = AppState.edges.filter(e => e.from === fromNodeId);
            if (outEdges.length === 0) return null;

            // 各エッジの重みを合計する
            let totalWeight = outEdges.reduce((sum, e) => {
                const w = e.weight;
                return sum + w;
            }, 0);
            
            // 全ての重みが0の場合は均等にランダム
            if (totalWeight <= 0) {
                return outEdges[Math.floor(Math.random() * outEdges.length)].to;
            }

            const r = Math.random() * totalWeight;
            let cumulativeWeight = 0.0;
            
            for (const edge of outEdges) {
                const w = edge.weight;
                cumulativeWeight += w;
                if (r <= cumulativeWeight) {
                    return edge.to;
                }
            }
            
            // 浮動小数点誤差の対策でフォールバック
            return outEdges[outEdges.length - 1].to;
        }

        function stopPlayback() {
            AppState.playback.isPlaying = false;
            AppState.playback.currentNode = null;
            
            if (AppState.playback.sourceNode) {
                try {
                    AppState.playback.sourceNode.stop();
                    AppState.playback.sourceNode.onended = null;
                } catch(e) {}
                AppState.playback.sourceNode = null;
            }

            document.getElementById('btn-play-all').classList.remove('hidden');
            document.getElementById('btn-stop-all').classList.add('hidden');
            setStatus('準備完了: ノードをドラッグして配置、またはクリックして接続');
            draw();
        }

        // プログレスバーUI
        function showLoadingBar(show) {
            const container = document.getElementById('loading-bar-container');
            const bar = document.getElementById('loading-bar');
            if (show) {
                container.classList.remove('hidden');
                bar.style.width = '0%';
            } else {
                container.classList.add('hidden');
            }
        }
        function updateLoadingBar(percent) {
            document.getElementById('loading-bar').style.width = `${percent}%`;
        }


        /**
         * セーブ＆ロード
         */
        document.getElementById('btn-save').addEventListener('click', () => {
            const saveData = {
                audioNames: AppState.audioFiles.map(a => a.name),
                nodes: AppState.nodes,
                edges: AppState.edges,
                camera: AppState.camera
            };
            
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(saveData));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "MarkovAudio_save.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        });

        document.getElementById('file-load').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    
                    stopPlayback();

                    // Node, Edgeの読み込み
                    AppState.nodes = data.nodes || [];
                    AppState.edges = data.edges || [];
                    if (data.camera) {
                        AppState.camera = data.camera;
                    }

                    // AudioFileの突き合わせ
                    const savedNames = data.audioNames || [];
                    const currentNames = new Set(AppState.audioFiles.map(a => a.name));
                    
                    // 既存リストにないものをMissing状態として追加
                    savedNames.forEach(name => {
                        if (!currentNames.has(name)) {
                            AppState.audioFiles.push({
                                id: 'missing_' + Date.now() + Math.random().toString(),
                                name: name,
                                file: null,
                                isMissing: true
                            });
                        }
                    });

                    renderAudioList();
                    draw();
                    updateUIOverlay();
                    setStatus('データをロードしました');

                } catch (err) {
                    console.error("Load error", err);
                    alert("ファイルの読み込みに失敗しました");
                }
            };
            reader.readAsText(file);
            e.target.value = ''; // Reset
        });

        /**
         * アプリケーション開始
         */
        function setupEventListeners() {
            // ウィンドウからフォーカスが外れたら接続モード解除
            window.addEventListener('blur', () => {
                if(AppState.interaction.mode === 'connecting') exitConnectingMode();
            });
            // Escapeキーで接続キャンセル
            window.addEventListener('keydown', (e) => {
                if(e.key === 'Escape' && AppState.interaction.mode === 'connecting') {
                    exitConnectingMode();
                }
            });
        }

        // 起動
        window.onload = init;

    </script>
</body>
</html>
