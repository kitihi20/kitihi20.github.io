<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D PRNG Dice Simulator</title>
    <!-- Three.jsの読み込み -->
    <script src="/js/three.min.js"></script>
    <style>
        :root {
            --primary-color: #38bdf8; /* カジュアルでモダンなブルー */
            --bg-color: #0f172a; /* 落ち着いたダークネイビー */
            --surface-color: rgba(30, 41, 59, 0.8); /* UIの背景色 */
            --text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--primary-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            user-select: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            box-sizing: border-box;
            backdrop-filter: blur(2px); /* 少しだけ背景をぼかす */
        }

        .interactive {
            pointer-events: auto;
        }

        header {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: var(--surface-color);
            padding: 15px 20px;
            border-radius: 12px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            width: fit-content;
        }

        h1 {
            margin: 0;
            font-size: 1.4rem;
            letter-spacing: 1px;
            text-shadow: var(--text-shadow);
            color: #fff;
        }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            background: transparent;
            color: var(--primary-color);
            border: 1px solid rgba(56, 189, 248, 0.5);
            padding: 8px 16px;
            border-radius: 8px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover, button.active {
            background: var(--primary-color);
            color: #fff;
            box-shadow: 0 0 12px rgba(56, 189, 248, 0.4);
            border-color: var(--primary-color);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: rgba(56, 189, 248, 0.1);
            color: var(--primary-color);
            box-shadow: none;
        }

        #console {
            background: var(--surface-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            height: 120px;
            overflow-y: auto;
            font-size: 0.9rem;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            margin-bottom: 20px;
            color: #cbd5e1;
            font-family: 'Courier New', Courier, monospace; /* ログ部分だけ等幅フォントを残す */
        }

        .console-line {
            margin: 2px 0;
            animation: fadeIn 0.2s ease-out;
        }
        
        .console-line .time {
            color: #64748b;
            margin-right: 8px;
        }

        .footer-controls {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            width: 100%;
        }

        #btn-roll {
            font-size: 1.4rem;
            padding: 15px 50px;
            border: none;
            border-radius: 30px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #0284c7, #38bdf8);
            color: #fff;
            box-shadow: 0 4px 15px rgba(56, 189, 248, 0.3);
            text-transform: uppercase;
        }
        
        #btn-roll:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.5);
        }

        #huge-result {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 15vw;
            font-weight: bold;
            color: var(--primary-color);
            text-shadow: 0 0 30px var(--primary-color);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            z-index: 0; /* モデルの奥または手前 */
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-10px); }
            to { opacity: 1; transform: translateX(0); }
        }

        /* スクロールバーのスタイル */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #38bdf8; border-radius: 3px; }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <div id="huge-result"></div>

    <div id="ui-layer">
        <header>
            <h1>🎲 3D Dice Simulator</h1>
            <div class="controls interactive" id="dice-selector">
                <button onclick="selectDice(4)" id="btn-d4">D4</button>
                <button onclick="selectDice(6)" id="btn-d6" class="active">D6</button>
                <button onclick="selectDice(8)" id="btn-d8">D8</button>
                <button onclick="selectDice(10)" id="btn-d10">D10</button>
                <button onclick="selectDice(12)" id="btn-d12">D12</button>
                <button onclick="selectDice(20)" id="btn-d20">D20</button>
                <button onclick="selectDice(100)" id="btn-d100">D100</button>
            </div>
        </header>

        <div>
            <div id="console" class="interactive"></div>
            <div class="footer-controls interactive">
                <button id="btn-roll" onclick="rollDice()">ROLL DICE</button>
            </div>
        </div>
    </div>

    <script>
        // --- ターミナルログシステム ---
        const consoleEl = document.getElementById('console');
        function logMsg(msg) {
            const line = document.createElement('div');
            line.className = 'console-line';
            const time = new Date().toLocaleTimeString('ja-JP', { hour12: false });
            line.innerHTML = `<span class="time">[${time}]</span> ${msg}`;
            consoleEl.appendChild(line);
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        // --- Three.js セットアップ ---
        let scene, camera, renderer;
        let currentDiceObject = null;
        let currentSides = 6;
        
        // アニメーション状態
        let isRolling = false;
        let rollVelocity = new THREE.Vector3();
        let targetRotation = new THREE.Vector3();
        let damping = 0.98;

        const solidMat = new THREE.MeshStandardMaterial({
            color: 0x0f172a, /* 背景色と同化させて奥行きを出す */
            emissive: 0x0f172a,
            transparent: true,
            opacity: 0.9,
            flatShading: true,
            polygonOffset: true,
            polygonOffsetFactor: 1,
            polygonOffsetUnits: 1
        });

        const wireMat = new THREE.MeshBasicMaterial({
            color: 0x38bdf8, /* アクセントのブルー */
            wireframe: true,
            transparent: true,
            opacity: 0.8
        });

        function init() {
            logMsg("シミュレーターを初期化しました。");

            const container = document.getElementById('canvas-container');
            
            scene = new THREE.Scene();
            // フォグを追加して奥行きを強調
            scene.fog = new THREE.FogExp2(0x0f172a, 0.05);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.z = 10;

            renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // ライティング
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);
            
            const dirLight = new THREE.DirectionalLight(0x38bdf8, 1);
            dirLight.position.set(5, 10, 7);
            scene.add(dirLight);

            const pointLight = new THREE.PointLight(0x0284c7, 2, 20);
            pointLight.position.set(-5, -5, 5);
            scene.add(pointLight);

            window.addEventListener('resize', onWindowResize, false);

            logMsg("3Dエンジンの準備が完了しました。");
            selectDice(6, true);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // メッシュ構築ヘルパー (ソリッド+ワイヤーフレーム)
        function createDiceMesh(geometry) {
            const group = new THREE.Group();
            const solid = new THREE.Mesh(geometry, solidMat);
            const wire = new THREE.Mesh(geometry, wireMat);
            group.add(solid);
            group.add(wire);
            return group;
        }

        // D10用の特殊なジオメトリ生成 (10面体/双五角錐)
        function createD10Group() {
            const group = new THREE.Group();
            const radius = 2.5;
            const height = 3;
            // 上半分 (5角錐)
            const topGeo = new THREE.ConeGeometry(radius, height, 5);
            const topMesh = createDiceMesh(topGeo);
            topMesh.position.y = height / 2;
            
            // 下半分 (5角錐)
            const botGeo = new THREE.ConeGeometry(radius, height, 5);
            const botMesh = createDiceMesh(botGeo);
            botMesh.rotation.x = Math.PI;
            botMesh.rotation.y = Math.PI / 5; // 互い違いにずらす
            botMesh.position.y = -height / 2;
            
            group.add(topMesh);
            group.add(botMesh);
            return group;
        }

        function selectDice(sides, isInit = false) {
            if (isRolling) return;
            
            currentSides = sides;
            
            // UI更新
            document.querySelectorAll('#dice-selector button').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`btn-d${sides}`).classList.add('active');
            
            // 古いオブジェクトの削除
            if (currentDiceObject) {
                scene.remove(currentDiceObject);
            }

            // ジオメトリ生成
            let geometry;
            let scale = 1;
            
            switch(sides) {
                case 4:
                    geometry = new THREE.TetrahedronGeometry(2.5);
                    break;
                case 6:
                    geometry = new THREE.BoxGeometry(3, 3, 3);
                    break;
                case 8:
                    geometry = new THREE.OctahedronGeometry(2.5);
                    break;
                case 10:
                    // D10は特殊処理
                    currentDiceObject = createD10Group();
                    break;
                case 12:
                    geometry = new THREE.DodecahedronGeometry(2.5);
                    break;
                case 20:
                    geometry = new THREE.IcosahedronGeometry(2.5);
                    break;
                case 100:
                    // D100はより細かいポリゴンの球体（ジオデシック・ドーム風）で表現
                    geometry = new THREE.IcosahedronGeometry(2.8, 3);
                    break;
            }

            if (sides !== 10) {
                currentDiceObject = createDiceMesh(geometry);
            }

            // 初期角度を少し傾ける
            currentDiceObject.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
            
            scene.add(currentDiceObject);

            document.getElementById('huge-result').style.opacity = '0';
            
            if (!isInit) {
                logMsg(`D${sides} ダイスを選択しました。`);
            }
        }

        function rollDice() {
            if (isRolling || !currentDiceObject) return;
            
            isRolling = true;
            document.getElementById('btn-roll').disabled = true;
            document.getElementById('huge-result').style.opacity = '0';
            logMsg(`D${currentSides} をロールしています...`);

            // 激しい回転を与える
            rollVelocity.set(
                (Math.random() * 0.4 + 0.2) * (Math.random() < 0.5 ? 1 : -1),
                (Math.random() * 0.4 + 0.2) * (Math.random() < 0.5 ? 1 : -1),
                (Math.random() * 0.4 + 0.2) * (Math.random() < 0.5 ? 1 : -1)
            );

            // 一定時間後に減速を開始するタイマー
            setTimeout(() => {
                isRolling = false;
                logMsg(`結果を計算中...`);
                calculateResult();
            }, 1000 + Math.random() * 1000); // 1〜2秒間回転
        }

        function calculateResult() {
            // 単純なPRNGロジック
            const result = Math.floor(Math.random() * currentSides) + 1;
            
            // 減速完了後の処理を待つ
            const checkStop = setInterval(() => {
                if (rollVelocity.length() < 0.01) {
                    clearInterval(checkStop);
                    showResult(result);
                }
            }, 100);
        }

        function showResult(result) {
            logMsg(`出目: <strong>${result}</strong>`);
            
            const hugeEl = document.getElementById('huge-result');
            hugeEl.textContent = result;
            hugeEl.style.opacity = '1';
            
            document.getElementById('btn-roll').disabled = false;
            
            // 強制的に正面を向かせるようなアニメーションの代わりに、結果を巨大表示するUIで成立させる
        }

        function animate() {
            requestAnimationFrame(animate);

            if (currentDiceObject) {
                if (isRolling) {
                    // 回転
                    currentDiceObject.rotation.x += rollVelocity.x;
                    currentDiceObject.rotation.y += rollVelocity.y;
                    currentDiceObject.rotation.z += rollVelocity.z;
                } else if (rollVelocity.length() > 0.001) {
                    // 減速フェーズ
                    rollVelocity.multiplyScalar(damping);
                    currentDiceObject.rotation.x += rollVelocity.x;
                    currentDiceObject.rotation.y += rollVelocity.y;
                    currentDiceObject.rotation.z += rollVelocity.z;
                } else {
                    // 完全停止後の微細な浮遊アニメーション
                    currentDiceObject.rotation.y += 0.002;
                    currentDiceObject.rotation.x += 0.001;
                }
            }

            renderer.render(scene, camera);
        }

        // アプリケーション起動
        window.onload = init;
    </script>
</body>
</html>
