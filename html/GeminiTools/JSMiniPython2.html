<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Python Calculator - Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap');

        :root {
            --bg-main: #020617;
            --bg-editor: #0f172a;
            --bg-numbers: #1e293b;
            --text-main: #e2e8f0;
            --text-muted: #64748b;
            --accent: #6366f1;
            --line-height: 1.6rem;
            --font-size: 14px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
        }

        .code-font {
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: var(--font-size);
            line-height: var(--line-height);
        }

        .main-container {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 140px);
            gap: 1rem;
        }

        @media (min-width: 768px) {
            .main-container {
                flex-direction: row;
            }
        }

        /* エディタと出力の共通枠組み */
        .panel-container {
            flex: 1;
            display: flex;
            background: var(--bg-editor);
            border: 1px solid #1e293b;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .line-numbers {
            width: 3.5rem;
            padding: 1rem 0;
            background: var(--bg-numbers);
            color: var(--text-muted);
            text-align: right;
            padding-right: 0.75rem;
            user-select: none;
            border-right: 1px solid #334155;
            overflow: hidden; /* スクロールはJSで同期 */
        }

        textarea {
            flex: 1;
            background: transparent;
            color: var(--text-main);
            border: none;
            outline: none;
            padding: 1rem;
            resize: none;
            white-space: pre;
            overflow-x: auto;
        }

        .display-area {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            color: #94a3b8;
        }

        .line-entry {
            height: var(--line-height);
            display: flex;
            align-items: center;
            white-space: pre;
        }

        .error-text {
            color: #f87171;
            font-weight: 500;
        }

        /* スクロールバーのカスタマイズ */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .btn-execute {
            background: var(--accent);
            transition: all 0.2s;
        }
        .btn-execute:hover {
            background: #4f46e5;
            box-shadow: 0 0 15px rgba(99, 102, 241, 0.4);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="mb-6 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
        <div>
            <h1 class="text-2xl font-bold text-slate-100">Mini Python Calculator <span class="text-xs font-normal bg-slate-800 px-2 py-1 rounded ml-2">Dark Mode</span></h1>
            <p class="text-slate-400 text-sm mt-1">Python風の記述で計算が可能です (Ctrl + Enter で実行)</p>
        </div>
        <button id="runBtn" class="btn-execute text-white px-8 py-2.5 rounded-lg font-bold shadow-lg">
            実行 (Run)
        </button>
    </header>

    <div class="main-container">
        <!-- プログラム入力画面 -->
        <div class="panel-container shadow-2xl">
            <div id="editorLineNumbers" class="line-numbers code-font"></div>
            <textarea id="codeInput" class="code-font" style="padding: 1rem;" spellcheck="false" placeholder="# ここにコードを入力&#10;x = 5&#10;y = 10&#10;z = (x + y) ** 2&#10;z / 2 # 結果を表示"></textarea>
        </div>

        <!-- 出力画面 -->
        <div class="panel-container shadow-2xl">
            <div id="outputLineNumbers" class="line-numbers code-font"></div>
            <div id="outputDisplay" class="display-area code-font">
                <!-- 結果がここに生成される -->
            </div>
        </div>
    </div>

    <!-- 説明セクション -->
    <section class="mt-8 bg-slate-900 rounded-xl p-6 border border-slate-800 shadow-sm">
        <h2 class="text-lg font-bold text-slate-200 mb-4 flex items-center gap-2">
            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            機能説明
        </h2>
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 text-slate-400">
            <div>
                <h3 class="font-bold text-slate-200 mb-2 text-sm uppercase tracking-wider">演算子</h3>
                <table class="w-full text-xs">
                    <tr class="border-b border-slate-800"><td class="py-2 font-mono text-indigo-400">+ , - , * , /</td><td class="py-2 text-right">四則演算</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2 font-mono text-indigo-400">**</td><td class="py-2 text-right">べき乗 (2 ** 3 = 8)</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2 font-mono text-indigo-400">//</td><td class="py-2 text-right">整数の商 (7 // 2 = 3)</td></tr>
                    <tr class="border-b border-slate-800"><td class="py-2 font-mono text-indigo-400">%</td><td class="py-2 text-right">余り (7 % 2 = 1)</td></tr>
                    <tr><td class="py-2 font-mono text-indigo-400">#</td><td class="py-2 text-right">コメントアウト</td></tr>
                </table>
            </div>
            <div>
                <h3 class="font-bold text-slate-200 mb-2 text-sm uppercase tracking-wider">数学関数 (Math)</h3>
                <div class="flex flex-wrap gap-2">
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">PI</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">E</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">sqrt(x)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">abs(x)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">sin(x)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">cos(x)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">log(x)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">pow(x,y)</span>
                    <span class="bg-slate-800 px-2 py-1 rounded text-xs font-mono">round(x)</span>
                </div>
                <p class="mt-4 text-xs italic">※ 関数の定義はサポートされていません。変数代入のみ可能です。</p>
            </div>
        </div>
    </section>

    <script>
        const codeInput = document.getElementById('codeInput');
        const outputDisplay = document.getElementById('outputDisplay');
        const editorLineNumbers = document.getElementById('editorLineNumbers');
        const outputLineNumbers = document.getElementById('outputLineNumbers');
        const runBtn = document.getElementById('runBtn');

        // 行番号の更新とスクロール同期
        function updateAllLineNumbers() {
            const lines = codeInput.value.split('\n').length || 1;
            let numHtml = '';
            for (let i = 1; i <= lines; i++) {
                numHtml += `<div>${i}</div>`;
            }
            editorLineNumbers.innerHTML = numHtml;
            outputLineNumbers.innerHTML = numHtml;
            syncScroll();
        }

        function syncScroll() {
            editorLineNumbers.scrollTop = codeInput.scrollTop;
            // 出力側のスクロール同期は、出力側にもスクロールが発生する場合に必要
            outputLineNumbers.scrollTop = outputDisplay.scrollTop;
        }

        // 計算ロジック
        function execute() {
            const lines = codeInput.value.split('\n');
            let scope = {
                PI: Math.PI,
                E: Math.E,
                sqrt: Math.sqrt,
                abs: Math.abs,
                sin: Math.sin,
                cos: Math.cos,
                tan: Math.tan,
                log: Math.log,
                exp: Math.exp,
                pow: Math.pow,
                floor: Math.floor,
                ceil: Math.ceil,
                round: Math.round
            };

            outputDisplay.innerHTML = '';
            let errorOccurred = false;

            lines.forEach((line, index) => {
                const lineDiv = document.createElement('div');
                lineDiv.className = 'line-entry';

                if (errorOccurred) {
                    outputDisplay.appendChild(lineDiv);
                    return;
                }

                const cleanLine = line.split('#')[0].trim();

                if (cleanLine === '') {
                    outputDisplay.appendChild(lineDiv);
                    return;
                }

                try {
                    // Python風整数の商 // を JS用に変換
                    let processedLine = cleanLine.replace(/(\w+|\d+)\s*\/\/\s*(\w+|\d+)/g, 'Math.floor(($1) / ($2))');

                    if (processedLine.includes('=') && !/==|!=|<=|>=/.test(processedLine)) {
                        const parts = processedLine.split('=');
                        const varName = parts[0].trim();
                        const expression = parts.slice(1).join('=').trim();

                        if (!/^[a-zA-Z_]\w*$/.test(varName)) {
                            throw new Error(`変数が不正: ${varName}`);
                        }

                        const result = evaluateExpression(expression, scope);
                        scope[varName] = result;
                        // 代入行は何も出力しない
                    } else {
                        const result = evaluateExpression(processedLine, scope);
                        lineDiv.textContent = result;
                        lineDiv.style.color = '#f1f5f9'; // 計算結果は明るく
                    }
                } catch (e) {
                    lineDiv.innerHTML = `<span class="error-text">Error: ${e.message}</span>`;
                    errorOccurred = true;
                }

                outputDisplay.appendChild(lineDiv);
            });
            
            // 実行後に行番号を同期（出力側の高さが変わる可能性があるため）
            updateAllLineNumbers();
        }

        function evaluateExpression(expr, scope) {
            const keys = Object.keys(scope);
            const values = Object.values(scope);
            
            // Pythonの ** はJSの ** と同じ
            try {
                const func = new Function(...keys, `return (${expr});`);
                const result = func(...values);
                
                if (typeof result === 'number') {
                    if (isNaN(result)) return 'NaN';
                    if (!isFinite(result)) return 'Infinity';
                    return Number.isInteger(result) ? result : parseFloat(result.toFixed(10));
                }
                return result === undefined ? '' : result;
            } catch (err) {
                throw new Error("式の評価に失敗");
            }
        }

        // イベント
        codeInput.addEventListener('input', updateAllLineNumbers);
        codeInput.addEventListener('scroll', syncScroll);
        outputDisplay.addEventListener('scroll', syncScroll);

        codeInput.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                e.preventDefault();
                execute();
            }
            if (e.key === 'Tab') {
                e.preventDefault();
                const start = codeInput.selectionStart;
                const end = codeInput.selectionEnd;
                codeInput.value = codeInput.value.substring(0, start) + "    " + codeInput.value.substring(end);
                codeInput.selectionStart = codeInput.selectionEnd = start + 4;
            }
        });

        runBtn.addEventListener('click', execute);

        // 初期化
        updateAllLineNumbers();
    </script>
</body>
</html>
