<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Media Converter</title>

    <!-- Cross-Origin Isolation (COOP/COEP) を有効化するための Service Worker -->
    <!-- ffmpegのworkerでもCOEPが求められるため、この方法では結局マルチスレッドで動作させられない -->
    <!-- <script src="coi-serviceworker.js"></script> -->
    
    <style>
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --border-color: #333333;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --accent-color: #007acc;
            --accent-hover: #005f9e;
            --danger-color: #d32f2f;
            --success-color: #388e3c;
            --font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            --font-mono: Consolas, 'Courier New', monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-family);
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
        }

        .status-badge {
            font-size: 0.8rem;
            padding: 4px 8px;
            border-radius: 4px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
        }

        .status-badge.mt-active {
            color: #4caf50;
            border-color: #4caf50;
        }
        
        .status-badge.mt-inactive {
            color: #ff9800;
            border-color: #ff9800;
        }

        .panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
        }

        /* ドロップゾーン */
        .drop-zone {
            border: 2px dashed var(--border-color);
            border-radius: 8px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background-color: rgba(255, 255, 255, 0.02);
        }

        .drop-zone:hover, .drop-zone.dragover {
            border-color: var(--accent-color);
            background-color: rgba(0, 122, 204, 0.05);
        }

        .drop-zone input[type="file"] {
            display: none;
        }

        .file-info {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--accent-color);
        }

        /* 設定エリア */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        select, input[type="text"] {
            background-color: #2d2d2d;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 8px;
            border-radius: 4px;
            font-size: 0.9rem;
            outline: none;
        }

        select:focus, input:focus {
            border-color: var(--accent-color);
        }

        .video-settings {
            border-left: 2px solid var(--accent-color);
            padding-left: 15px;
        }
        
        .audio-settings {
            border-left: 2px solid #9c27b0;
            padding-left: 15px;
        }

        /* アクションエリア */
        .action-area {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: background-color 0.2s;
        }

        button:hover:not(:disabled) {
            background-color: var(--accent-hover);
        }

        button:disabled {
            background-color: var(--border-color);
            color: var(--text-muted);
            cursor: not-allowed;
        }

        /* プログレスバー */
        .progress-container {
            width: 100%;
            display: none;
            flex-direction: column;
            gap: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background-color: #2d2d2d;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--accent-color);
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-text {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: right;
        }

        /* ログエリア */
        .log-area {
            background-color: #000000;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: #d4d4d4;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .log-error { color: #f48771; }
        .log-info { color: #75beff; }
        .log-success { color: #89d185; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Web Media Converter</h1>
            <div id="isolation-status" class="status-badge">Checking environment...</div>
        </header>

        <div class="panel">
            <div class="drop-zone" id="drop-zone">
                <p>クリックしてファイルを選択するか、ここにファイルをドラッグ＆ドロップ</p>
                <input type="file" id="file-input" accept="video/*,audio/*">
                <div class="file-info" id="file-info"></div>
            </div>

            <div class="settings-grid">
                <!-- 基本設定 -->
                <div class="form-group" style="grid-column: 1 / -1;">
                    <label for="out-format">出力フォーマット</label>
                    <select id="out-format">
                        <option value="mp4" selected>MP4 (H.264 / AAC)</option>
                        <option value="webm">WebM (VP9 / Opus)</option>
                        <option value="mov">MOV (H.264 / AAC)</option>
                        <option value="mp3">MP3 (Audio Only)</option>
                        <option value="m4a">M4A (AAC Audio Only)</option>
                        <option value="wav">WAV (Lossless Audio)</option>
                        <option value="ogg">OGG (Vorbis Audio)</option>
                    </select>
                </div>

                <!-- 映像設定 -->
                <div class="form-group video-settings" id="setting-group-video">
                    <label>映像設定</label>
                    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                        <div>
                            <label for="v-res">解像度</label>
                            <select id="v-res" style="width: 100%;">
                                <option value="auto">オリジナルを保持</option>
                                <option value="-2:1080">1080p</option>
                                <option value="-2:720">720p</option>
                                <option value="-2:480">480p</option>
                            </select>
                        </div>
                        <div>
                            <label for="v-fps">フレームレート (FPS)</label>
                            <select id="v-fps" style="width: 100%;">
                                <option value="auto">オリジナルを保持</option>
                                <option value="60">60 fps</option>
                                <option value="30">30 fps</option>
                                <option value="24">24 fps</option>
                            </select>
                        </div>
                        <div>
                            <label for="v-bitrate">映像ビットレート</label>
                            <select id="v-bitrate" style="width: 100%;">
                                <option value="auto">自動 (デフォルト)</option>
                                <option value="10M">10 Mbps (高画質)</option>
                                <option value="5M">5 Mbps (標準)</option>
                                <option value="2M">2 Mbps (低容量)</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- 音声設定 -->
                <div class="form-group audio-settings" id="setting-group-audio">
                    <label>音声設定</label>
                    <div style="display: flex; flex-direction: column; gap: 10px; margin-top: 5px;">
                        <div>
                            <label for="a-bitrate">音声ビットレート</label>
                            <select id="a-bitrate" style="width: 100%;">
                                <option value="auto">自動 (デフォルト)</option>
                                <option value="320k">320 kbps (最高音質)</option>
                                <option value="256k">256 kbps (高音質)</option>
                                <option value="192k" selected>192 kbps (標準)</option>
                                <option value="128k">128 kbps (低容量)</option>
                            </select>
                        </div>
                        <div>
                            <label for="a-sample">サンプリングレート</label>
                            <select id="a-sample" style="width: 100%;">
                                <option value="auto">オリジナルを保持</option>
                                <option value="48000">48000 Hz</option>
                                <option value="44100">44100 Hz</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>

            <div class="action-area">
                <button id="btn-convert" disabled>初期化中...</button>
                
                <div class="progress-container" id="progress-container">
                    <div class="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                    </div>
                    <div class="progress-text" id="progress-text">0%</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3 style="margin-bottom: 10px; font-size: 1rem;">処理ログ</h3>
            <div class="log-area" id="log-area"></div>
        </div>
    </div>

    <!-- アプリケーションロジック -->
    <script type="module">
        //import { FFmpeg } from "https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js";
        //import { fetchFile, toBlobURL } from "https://unpkg.com/@ffmpeg/util@0.12.2/dist/esm/index.js";
        import { FFmpeg } from "/ffmpeg/ffmpeg/dist/esm/index.js";
        import { fetchFile, toBlobURL } from "/ffmpeg/util/dist/esm/index.js";

        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const fileInfo = document.getElementById('file-info');
        const btnConvert = document.getElementById('btn-convert');
        const outFormat = document.getElementById('out-format');
        const videoSettingsGroup = document.getElementById('setting-group-video');
        const logArea = document.getElementById('log-area');
        const progressContainer = document.getElementById('progress-container');
        const progressFill = document.getElementById('progress-fill');
        const progressText = document.getElementById('progress-text');
        const isolationStatus = document.getElementById('isolation-status');

        let ffmpeg = null;
        let selectedFile = null;
        let isConverting = false;

        // --- ユーティリティ関数 ---

        function appendLog(message, type = 'info') {
            const span = document.createElement('span');
            span.className = `log-${type}`;
            const time = new Date().toLocaleTimeString();
            span.textContent = `[${time}] ${message}\n`;
            logArea.appendChild(span);
            logArea.scrollTop = logArea.scrollHeight;
        }

        function formatBytes(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        // --- UI設定の切り替え制御 ---

        const audioOnlyFormats = ['mp3', 'wav', 'm4a', 'ogg'];
        
        outFormat.addEventListener('change', (e) => {
            const format = e.target.value;
            if (audioOnlyFormats.includes(format)) {
                videoSettingsGroup.style.display = 'none';
                document.getElementById('a-bitrate').disabled = (format === 'wav'); // WAVは非圧縮のため無効化
            } else {
                videoSettingsGroup.style.display = 'block';
                document.getElementById('a-bitrate').disabled = false;
            }
        });

        // --- ファイル選択ハンドリング ---

        function handleFileSelect(file) {
            if (!file) return;
            selectedFile = file;
            fileInfo.textContent = `選択中: ${file.name} (${formatBytes(file.size)})`;
            if (ffmpeg && ffmpeg.loaded && !isConverting) {
                btnConvert.disabled = false;
            }
            appendLog(`ファイルが選択されました: ${file.name}`);
        }

        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        
        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });
        
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files && e.dataTransfer.files.length > 0) {
                handleFileSelect(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files.length > 0) {
                handleFileSelect(e.target.files[0]);
            }
        });

        // --- FFmpeg初期化 ---

        async function initFFmpeg() {
            try {
                ffmpeg = new FFmpeg();

                // ログハンドラ
                ffmpeg.on('log', ({ message }) => {
                    // 一般的なログは量が多すぎるためフィルタリングするか控えめに
                    // 今回は全て出力するが、本来はエラー等で分ける
                    appendLog(message);
                });

                // プログレスハンドラ
                ffmpeg.on('progress', ({ progress, time }) => {
                    const percent = Math.max(0, Math.min(100, Math.round(progress * 100)));
                    progressFill.style.width = `${percent}%`;
                    progressText.textContent = `${percent}% 完了`;
                });

                const isMT = window.crossOriginIsolated;
                
                if (isMT) {
                    isolationStatus.textContent = "Multi-Thread: Enabled";
                    isolationStatus.className = "status-badge mt-active";
                    appendLog("Cross-Origin Isolation が有効です。マルチスレッド版(core-mt)を読み込みます。", "success");
                } else {
                    isolationStatus.textContent = "Multi-Thread: Disabled (Fallback)";
                    isolationStatus.className = "status-badge mt-inactive";
                    appendLog("警告: Cross-Origin Isolation が無効なため、シングルスレッド版を読み込みます。めっちゃ遅い。動画出力非推奨。", "error");
                }

                // 環境に応じて読み込むコアを切り替え
                const baseURL = isMT 
                    ? 'https://unpkg.com/@ffmpeg/core-mt@0.12.6/dist/esm'
                    : 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';

                appendLog("FFmpegコアをダウンロード中...");

                const loadConfig = {
                    coreURL: await toBlobURL(`${baseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${baseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                };
                
                // マルチスレッド版のみWorkerが必要
                if (isMT) {
                    loadConfig.workerURL = await toBlobURL(`${baseURL}/ffmpeg-core.worker.js`, 'text/javascript');
                }

                await ffmpeg.load(loadConfig);

                appendLog("FFmpegの初期化が完了しました。準備完了です。", "success");
                btnConvert.textContent = "変換開始";
                if (selectedFile) btnConvert.disabled = false;

            } catch (error) {
                appendLog(`FFmpegのロードに失敗しました: ${error.message}`, "error");
                btnConvert.textContent = "エラーが発生しました";
            }
        }

        // --- 変換処理 ---

        btnConvert.addEventListener('click', async () => {
            if (!selectedFile || !ffmpeg.loaded) return;

            isConverting = true;
            btnConvert.disabled = true;
            progressContainer.style.display = 'flex';
            progressFill.style.width = '0%';
            progressText.textContent = '0%';
            
            const ext = outFormat.value;
            const isAudioOnly = audioOnlyFormats.includes(ext);
            const inputFileName = 'input_file';
            const outputFileName = `output.${ext}`;

            appendLog(`--- 変換処理を開始します: ${selectedFile.name} -> ${outputFileName} ---`, "info");

            try {
                // ファイルを仮想ファイルシステムに書き込み
                appendLog("ファイルをメモリに読み込んでいます...");
                await ffmpeg.writeFile(inputFileName, await fetchFile(selectedFile));

                // 引数組み立て
                const args = ['-i', inputFileName];

                // --- 映像設定の適用 ---
                if (isAudioOnly) {
                    args.push('-vn'); // 映像を削除
                } else {
                    const res = document.getElementById('v-res').value;
                    const fps = document.getElementById('v-fps').value;
                    const vBitrate = document.getElementById('v-bitrate').value;

                    // コーデックの明示指定
                    if (ext === 'mp4' || ext === 'mov') args.push('-c:v', 'libx264');
                    if (ext === 'webm') args.push('-c:v', 'libvpx-vp9');

                    if (res !== 'auto') args.push('-vf', `scale=${res}`);
                    if (fps !== 'auto') args.push('-r', fps);
                    if (vBitrate !== 'auto') args.push('-b:v', vBitrate);
                }

                // --- 音声設定の適用 ---
                const aBitrate = document.getElementById('a-bitrate').value;
                const aSample = document.getElementById('a-sample').value;

                // コーデックの明示指定
                if (ext === 'mp4' || ext === 'mov' || ext === 'm4a') args.push('-c:a', 'aac');
                if (ext === 'webm') args.push('-c:a', 'libopus');
                if (ext === 'mp3') args.push('-c:a', 'libmp3lame');
                if (ext === 'ogg') args.push('-c:a', 'libvorbis');
                if (ext === 'wav') args.push('-c:a', 'pcm_s16le');

                if (aBitrate !== 'auto' && ext !== 'wav') args.push('-b:a', aBitrate);
                if (aSample !== 'auto') args.push('-ar', aSample);

                // スレッド数の設定 (core-mt環境の場合は自動で最適化させる)
                if (window.crossOriginIsolated) {
                    args.push('-threads', '0');
                }

                // 出力ファイル名
                args.push(outputFileName);

                appendLog(`実行コマンド: ffmpeg ${args.join(' ')}`);

                // 実行
                await ffmpeg.exec(args);

                appendLog("変換が完了しました。ファイルを生成しています...", "success");

                // ファイルの読み出しとダウンロード
                const data = await ffmpeg.readFile(outputFileName);
                
                // 元のファイル名から拡張子を取り除いた名前に新しい拡張子をつける
                const originalNameWithoutExt = selectedFile.name.substring(0, selectedFile.name.lastIndexOf('.')) || selectedFile.name;
                const downloadName = `${originalNameWithoutExt}_converted.${ext}`;

                const blob = new Blob([data.buffer], { type: `video/${ext}` }); // mime-typeはざっくりで問題なし
                const url = URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.href = url;
                a.download = downloadName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                
                URL.revokeObjectURL(url);
                appendLog(`ダウンロードを開始しました: ${downloadName}`, "success");

                // メモリクリーンアップ
                await ffmpeg.deleteFile(inputFileName);
                await ffmpeg.deleteFile(outputFileName);

            } catch (error) {
                appendLog(`エラーが発生しました: ${error.message}`, "error");
            } finally {
                isConverting = false;
                btnConvert.disabled = false;
                progressContainer.style.display = 'none';
            }
        });

        // --- 初期化実行 ---
        window.addEventListener('load', () => {
            initFFmpeg();
        });

    </script>
</body>
</html>
