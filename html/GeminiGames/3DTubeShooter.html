<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3DTubeShooter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            user-select: none;
        }
        #ui-container {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            text-shadow: 0 0 10px #0ff;
            z-index: 10;
        }
        .stat {
            font-size: 24px;
            margin-bottom: 5px;
        }
        #superzapper-bar {
            width: 200px;
            height: 10px;
            border: 1px solid #fff;
            margin-top: 10px;
        }
        #superzapper-fill {
            width: 100%;
            height: 100%;
            background-color: #0f0;
            transition: width 0.1s;
        }
        #weapon-status {
            margin-top: 15px;
            font-weight: bold;
            font-size: 20px;
            color: #ff0;
            display: none;
        }
        #difficulty-indicator {
            font-size: 14px;
            color: #f0f;
            margin-top: 10px;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            display: none;
            background: rgba(0,0,0,0.8);
            padding: 40px;
            border: 2px solid #f0f;
            box-shadow: 0 0 20px #f0f;
            z-index: 20;
        }
        #game-over h1 { font-size: 48px; color: #f0f; margin-bottom: 20px; }
        button {
            padding: 10px 20px;
            font-size: 20px;
            background: #0ff;
            border: none;
            cursor: pointer;
            color: #000;
            font-weight: bold;
        }
        button:hover { background: #fff; }
        
        #instructions {
            position: absolute;
            bottom: 20px;
            left: 20px;
            font-size: 14px;
            color: #aaa;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui-container">
        <div class="stat">SCORE: <span id="score">0</span></div>
        <div class="stat">LIVES: <span id="lives">3</span></div>
        <div id="superzapper-label">SUPERZAPPER</div>
        <div id="superzapper-bar"><div id="superzapper-fill"></div></div>
        <div id="weapon-status">WEAPON: NORMAL</div>
        <div id="difficulty-indicator">LEVEL: 1</div>
    </div>

    <div id="instructions">
        [A/D] or [←/→]: Move (Hold for repeat) | [Space]: Shoot | [W] or [↑]: Jump | [S] or [Z]: Zapper
    </div>

    <div id="game-over">
        <h1>GAME OVER</h1>
        <p>FINAL SCORE: <span id="final-score">0</span></p>
        <button onclick="resetGame()">RESTART</button>
    </div>

    <script>
        // --- 設定 (Configuration) ---
        const LANES = 16;
        const RADIUS = 40;
        const WEB_LENGTH = 300;
        const PLAYER_Z = 0;
        const ENEMY_SPAWN_Z = -300;
        const BULLET_SPEED = 6;
        const ZAPPER_COOLDOWN = 5000;
        const JUMP_DURATION = 1500;
        const MOVE_REPEAT_INTERVAL = 100; // 0.2秒間隔
        const POWERUP_TIME = 8000; // パワーアップ持続時間 (ms)

        // --- ゲーム状態 (Game State) ---
        let score = 0;
        let lives = 3;
        let lastZapperTime = 0;
        let isGameOver = false;
        let playerLane = 0;
        let playerJumpHeight = 0;
        let isJumping = false;
        let jumpStartTime = 0;
        let hue = 0;
        let gameStartTime = Date.now();

        // 移動管理
        let lastMoveTime = 0;

        // 武器状態
        let weaponType = 'NORMAL'; // 'NORMAL', 'PIERCE', 'BURST'
        let weaponEndTime = 0;

        const keys = {};
        const bullets = [];
        const enemies = [];
        const items = [];
        const particles = [];

        // --- Three.js セットアップ ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const BASE_CAMERA_Z = 60;
        camera.position.z = BASE_CAMERA_Z;
        camera.position.y = 10;

        // --- オブジェクト生成 ---
        let webLines;
        let player;

        function createWeb() {
            const material = new THREE.LineBasicMaterial({ color: 0x00ffff });
            const geometry = new THREE.BufferGeometry();
            const vertices = [];

            const rings = 12;
            for (let r = 0; r <= rings; r++) {
                const z = -(r / rings) * WEB_LENGTH;
                for (let i = 0; i <= LANES; i++) {
                    const angle = (i / LANES) * Math.PI * 2;
                    vertices.push(Math.cos(angle) * RADIUS, Math.sin(angle) * RADIUS, z);
                    const nextAngle = ((i + 1) / LANES) * Math.PI * 2;
                    vertices.push(Math.cos(nextAngle) * RADIUS, Math.sin(nextAngle) * RADIUS, z);
                }
            }

            for (let i = 0; i < LANES; i++) {
                const angle = (i / LANES) * Math.PI * 2;
                const x = Math.cos(angle) * RADIUS;
                const y = Math.sin(angle) * RADIUS;
                vertices.push(x, y, 0);
                vertices.push(x, y, -WEB_LENGTH);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));
            webLines = new THREE.LineSegments(geometry, material);
            scene.add(webLines);
        }

        function createPlayer() {
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0xffff00 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(4, 1, 2), mat);
            group.add(body);
            const leftWing = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 2), mat);
            leftWing.position.set(-2, 1, 0);
            group.add(leftWing);
            const rightWing = new THREE.Mesh(new THREE.BoxGeometry(1, 3, 2), mat);
            rightWing.position.set(2, 1, 0);
            group.add(rightWing);
            scene.add(group);
            return group;
        }

        function getLanePos(lane, z, offset = 0) {
            // lane は整数値として扱う
            const angle = (lane / LANES) * Math.PI * 2 + (Math.PI / LANES);
            const r = RADIUS + offset;
            return {
                x: Math.cos(angle) * r,
                y: Math.sin(angle) * r,
                z: z,
                angle: angle
            };
        }

        // --- ロジック ---
        function spawnEnemy(speed) {
            if (isGameOver) return;
            const lane = Math.floor(Math.random() * LANES);
            const group = new THREE.Group();
            const mat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const geo = new THREE.BoxGeometry(3, 3, 0.5);
            const m1 = new THREE.Mesh(geo, mat); m1.rotation.z = Math.PI / 4;
            const m2 = new THREE.Mesh(geo, mat); m2.rotation.z = -Math.PI / 4;
            group.add(m1, m2);
            scene.add(group);
            enemies.push({
                mesh: group,
                lane: lane,
                z: ENEMY_SPAWN_Z,
                state: 'advancing',
                flipTimer: 0,
                speed: speed
            });
        }

        function spawnItem(lane, z) {
            const types = ['PIERCE', 'BURST'];
            const type = types[Math.floor(Math.random() * types.length)];
            const color = type === 'PIERCE' ? 0x00ff00 : 0xff00ff;
            
            const geo = new THREE.OctahedronGeometry(2);
            const mat = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(geo, mat);
            
            const pos = getLanePos(lane, z, 2);
            mesh.position.set(pos.x, pos.y, pos.z);
            scene.add(mesh);
            
            items.push({ mesh, lane, z, type });
        }

        function createExplosion(pos, color) {
            for (let i = 0; i < 15; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 0.5), new THREE.MeshBasicMaterial({ color: color }));
                p.position.set(pos.x, pos.y, pos.z);
                const vel = new THREE.Vector3((Math.random()-0.5)*2, (Math.random()-0.5)*2, (Math.random()-0.5)*2);
                scene.add(p);
                particles.push({ mesh: p, vel: vel, life: 1.0 });
            }
        }

        function activatePowerUp(type) {
            weaponType = type;
            weaponEndTime = Date.now() + POWERUP_TIME;
            const statusEl = document.getElementById('weapon-status');
            statusEl.style.display = 'block';
            statusEl.innerText = `WEAPON: ${type}`;
            statusEl.style.color = type === 'PIERCE' ? '#0f0' : '#f0f';
        }

        function updateScore(pts) {
            score += pts;
            document.getElementById('score').innerText = score;
        }

        function gameOver() {
            isGameOver = true;
            document.getElementById('game-over').style.display = 'block';
            document.getElementById('final-score').innerText = score;
        }

        function resetGame() {
            score = 0;
            lives = 3;
            isGameOver = false;
            playerLane = 0;
            playerJumpHeight = 0;
            isJumping = false;
            weaponType = 'NORMAL';
            document.getElementById('weapon-status').style.display = 'none';
            gameStartTime = Date.now();
            updateScore(0);
            document.getElementById('lives').innerText = lives;
            document.getElementById('game-over').style.display = 'none';
            enemies.forEach(e => scene.remove(e.mesh)); enemies.length = 0;
            bullets.forEach(b => scene.remove(b.mesh)); bullets.length = 0;
            items.forEach(it => scene.remove(it.mesh)); items.length = 0;
            particles.forEach(p => scene.remove(p.mesh)); particles.length = 0;
        }

        // --- 入力 ---
        window.addEventListener('keydown', e => {
            if (keys[e.code]) return; // 長押しによるブラウザのリピートを無視
            keys[e.code] = true;
            
            if (e.code === 'Space') fireBullet();
            if ((e.code === 'KeyW' || e.code === 'ArrowUp') && !isJumping && !isGameOver) {
                isJumping = true;
                jumpStartTime = Date.now();
            }
            if (e.code === 'KeyS' || e.code === 'KeyZ') {
                const now = Date.now();
                if (now - lastZapperTime >= ZAPPER_COOLDOWN) {
                    lastZapperTime = now;
                    document.getElementById('superzapper-fill').style.width = '0%';
                    scene.background = new THREE.Color(0xffffff);
                    setTimeout(() => { scene.background = new THREE.Color(0x000000); }, 50);
                    for (let i = enemies.length - 1; i >= 0; i--) {
                        const e = enemies[i];
                        createExplosion(e.mesh.position, 0xff0000);
                        scene.remove(e.mesh);
                        enemies.splice(i, 1);
                        updateScore(100);
                    }
                }
            }

            // 初回移動
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') {
                playerLane = (playerLane - 1 + LANES) % LANES;
                lastMoveTime = Date.now();
            }
            if (e.code === 'ArrowRight' || e.code === 'KeyD') {
                playerLane = (playerLane + 1) % LANES;
                lastMoveTime = Date.now();
            }
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        let lastFire = 0;
        function fireBullet() {
            const now = Date.now();
            if (now - lastFire < 120) return;
            lastFire = now;

            const spawn = (lane) => {
                const pos = getLanePos(lane, PLAYER_Z, playerJumpHeight);
                const mesh = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.5, 5), new THREE.MeshBasicMaterial({ color: weaponType === 'PIERCE' ? 0x00ff00 : 0xffffff }));
                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.rotation.z = pos.angle + Math.PI/2;
                scene.add(mesh);
                bullets.push({ mesh, lane, z: PLAYER_Z, piercedEnemies: new Set() });
            };

            if (weaponType === 'BURST') {
                spawn((playerLane - 1 + LANES) % LANES);
                spawn(playerLane);
                spawn((playerLane + 1) % LANES);
            } else {
                spawn(playerLane);
            }
        }

        // --- メインループ ---
        function animate() {
            requestAnimationFrame(animate);
            if (isGameOver) {
                renderer.render(scene, camera);
                return;
            }

            const now = Date.now();
            const elapsedTotal = now - gameStartTime;

            // 難易度
            const difficultyLevel = 1 + Math.floor(elapsedTotal / 10000);
            const currentSpawnProb = 0.002 + (difficultyLevel * 0.002);
            const currentEnemySpeed = 0.2 + (difficultyLevel * 0.1);
            document.getElementById('difficulty-indicator').innerText = `LEVEL: ${difficultyLevel}`;

            // 武器パワーアップ終了判定
            if (weaponType !== 'NORMAL' && now > weaponEndTime) {
                weaponType = 'NORMAL';
                document.getElementById('weapon-status').style.display = 'none';
            }

            // オートリピート移動処理
            if (now - lastMoveTime > MOVE_REPEAT_INTERVAL) {
                if (keys['ArrowLeft'] || keys['KeyA']) {
                    playerLane = (playerLane - 1 + LANES) % LANES;
                    lastMoveTime = now;
                } else if (keys['ArrowRight'] || keys['KeyD']) {
                    playerLane = (playerLane + 1) % LANES;
                    lastMoveTime = now;
                }
            }

            // ウェブの色
            hue += 0.5;
            webLines.material.color.setHSL(hue / 360, 1, 0.5);

            // Zapper UI
            const zapPercent = Math.min(100, ((now - lastZapperTime) / ZAPPER_COOLDOWN) * 100);
            const zapFill = document.getElementById('superzapper-fill');
            zapFill.style.width = zapPercent + '%';
            zapFill.style.backgroundColor = zapPercent === 100 ? '#0f0' : '#f00';

            // ジャンプとカメラ
            let currentCameraZ = BASE_CAMERA_Z;
            if (isJumping) {
                const jumpElapsed = now - jumpStartTime;
                if (jumpElapsed < JUMP_DURATION) {
                    const t = jumpElapsed / JUMP_DURATION;
                    playerJumpHeight = Math.sin(t * Math.PI) * 40;
                    currentCameraZ = BASE_CAMERA_Z + (playerJumpHeight * 1.5);
                } else {
                    isJumping = false; playerJumpHeight = 0;
                }
            }

            const pPos = getLanePos(playerLane, PLAYER_Z, playerJumpHeight);
            player.position.set(pPos.x, pPos.y, pPos.z);
            player.rotation.z = pPos.angle + Math.PI/2;
            camera.position.z = currentCameraZ;
            camera.position.x = Math.sin(now * 0.0004) * 4;
            camera.position.y = 10 + Math.cos(now * 0.0004) * 4;
            camera.lookAt(0, 0, -120);

            // 弾の更新
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                b.z -= BULLET_SPEED;
                b.mesh.position.z = b.z;
                if (b.z < -WEB_LENGTH) {
                    scene.remove(b.mesh); bullets.splice(i, 1);
                    continue;
                }
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (Math.round(e.lane) === b.lane && Math.abs(e.z - b.z) < 15) {
                        if (weaponType === 'PIERCE') {
                            if (!b.piercedEnemies.has(e)) {
                                b.piercedEnemies.add(e);
                                createExplosion(e.mesh.position, 0xff0000);
                                if (Math.random() < 0.2) spawnItem(e.lane, e.z);
                                scene.remove(e.mesh); enemies.splice(j, 1);
                                updateScore(50);
                            }
                        } else {
                            createExplosion(e.mesh.position, 0xff0000);
                            if (Math.random() < 0.2) spawnItem(e.lane, e.z);
                            scene.remove(e.mesh); scene.remove(b.mesh);
                            enemies.splice(j, 1); bullets.splice(i, 1);
                            updateScore(50);
                            break;
                        }
                    }
                }
            }

            // アイテムの更新
            for (let i = items.length - 1; i >= 0; i--) {
                const it = items[i];
                it.z += 1.5; // アイテム移動速度
                it.mesh.position.z = it.z;
                it.mesh.rotation.y += 0.05;
                it.mesh.rotation.x += 0.02;

                // プレイヤーによる回収
                if (it.z >= -5 && it.z <= 5 && Math.round(playerLane) === it.lane) {
                    activatePowerUp(it.type);
                    updateScore(200);
                    scene.remove(it.mesh); items.splice(i, 1);
                    continue;
                }
                if (it.z > 20) {
                    scene.remove(it.mesh); items.splice(i, 1);
                }
            }

            // 敵の生成と更新
            if (Math.random() < currentSpawnProb) spawnEnemy(currentEnemySpeed);
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.state === 'advancing') {
                    e.z += e.speed;
                    if (e.z >= 0) { e.z = 0; e.state = 'onRim'; }
                } else {
                    e.flipTimer += 0.05;
                    if (e.flipTimer > 0.7) {
                        e.flipTimer = 0;
                        const dCW = (playerLane - e.lane + LANES) % LANES;
                        const dCCW = (e.lane - playerLane + LANES) % LANES;
                        if (dCW < dCCW) e.lane = (e.lane + 1) % LANES;
                        else e.lane = (e.lane - 1 + LANES) % LANES;
                    }
                }
                const ePos = getLanePos(e.lane, e.z, 0);
                e.mesh.position.set(ePos.x, ePos.y, ePos.z);
                e.mesh.rotation.z = ePos.angle + Math.PI/2 + (e.state === 'onRim' ? Math.sin(now*0.01)*0.5 : 0);

                if (playerLane === e.lane && e.z >= -2 && playerJumpHeight < 8) {
                    lives--;
                    document.getElementById('lives').innerText = lives;
                    createExplosion(player.position, 0xffff00);
                    scene.remove(e.mesh); enemies.splice(i, 1);
                    if (lives <= 0) gameOver();
                }
            }

            // パーティクル
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.mesh.position.add(p.vel);
                p.life -= 0.025;
                p.mesh.material.opacity = p.life;
                p.mesh.material.transparent = true;
                if (p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            }

            renderer.render(scene, camera);
        }

        window.onload = () => {
            createWeb();
            player = createPlayer();
            animate();
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
